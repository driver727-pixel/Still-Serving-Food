services:
  - type: web
    name: still-serving-food-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: FOURSQUARE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: letsnarf-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: BUSINESS_JWT_SECRET
        sync: false

databases:
  - name: letsnarf-db
    plan: free
    databaseName: letsnarf
    postgresMajorVersion: "16"
